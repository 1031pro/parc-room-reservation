<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>жұәжёҲе®ҢдәҒE- PARC ROOM STUDIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>PARC ROOM STUDIO</h1>
      <p class="header-sub">гғ¬гғігӮҝгғ«гӮ№гӮҝгӮёгӮӘдәҲзҙҒE/p>
    </header>

    <section class="step-panel active" id="verifying">
      <p class="loading">жұәжёҲгӮ’зўәиӘҚдёӯ...</p>
    </section>

    <section class="step-panel" id="successPanel">
      <div class="complete-icon">вңҒE/div>
      <h2>дәҲзҙҒEҒҢе®ҢдәҒEҒ—гҒҫгҒ—гҒҹҒEҒE/h2>
      <div class="confirm-card" id="details"></div>
      <p class="complete-note" id="accessNote" style="display:none"></p>
      <button class="btn btn-primary" onclick="closePage()">й–үгҒҳгӮҒE/button>
    </section>

    <section class="step-panel" id="errorPanel">
      <h2>гӮЁгғ©гғјгҒҢзҷәз”ҹгҒ—гҒҫгҒ—гҒҹ</h2>
      <p id="errorMsg" style="color:#e94560;text-align:center;margin:20px 0;"></p>
      <button class="btn btn-primary" onclick="location.href='index.html'">дәҲзҙҒE”»йқўгҒ«жҲ»гӮҒE/button>
    </section>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwppiLTyW_bRMQhWaggS8PTPmK_H6mMIb7K8q1vuOuM9uT327-uIqmfrGkxGF3wbFcw/exec';
    const LIFF_ID = '2009890948-YwXjSlGC';

    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      var sessionId = params.get('session_id');
      var reservationId = params.get('reservation_id');

      if (!sessionId) {
        showError('гӮ»гғҒEӮ·гғ§гғіжғҒE ұгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“');
        return;
      }

      if (LIFF_ID) {
        liff.init({ liffId: LIFF_ID }).catch(function() {});
      }

      // GAS APIгҒ§жұәжёҲзўәиӘҚпјҒEәҲзҙҒEўәе®ҒE      callGasApi({ action: 'verify_payment', session_id: sessionId }, function(err, data) {
        if (err || !data.success) {
          showError(data ? data.message : 'жұәжёҲгҒEзўәиӘҚгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ');
          return;
        }
        showSuccess(data);
      });
    });

    function showSuccess(data) {
      document.getElementById('verifying').classList.remove('active');
      document.getElementById('successPanel').classList.add('active');

      var html = '<div class="confirm-row"><span class="label">дәҲзҙҒE•ӘеҸ·</span><span class="value">'
        + data.reservationId + '</span></div>'
        + '<div class="confirm-row"><span class="label">еҲ©з”Ёж—Ҙ</span><span class="value">'
        + data.date + '</span></div>'
        + '<div class="confirm-row"><span class="label">жҷӮй–“</span><span class="value">'
        + data.startTime + ' гҖҒE' + data.endTime + '</span></div>'
        + '<div class="confirm-row"><span class="label">дәәж•°</span><span class="value">'
        + data.people + 'еҗҒE/span></div>'
        + '<div class="confirm-total"><span>гҒҠж”Ҝжү•гҒ„жёҒE/span><span>ВҘ'
        + data.totalPrice.toLocaleString() + '</span></div>';
      document.getElementById('details').innerHTML = html;

      if (data.needsAccessCode) {
        var note = document.getElementById('accessNote');
        note.innerHTML = 'рҹ”‘ 21:00гҖҒE:00гҒҜгӮӘгғјгғҲгғӯгғҒEӮҜгҒ§гҒҷгҖӮжҡ—иЁјз•ӘеҸ·гҒҜеҲҘйҖ”LINEгҒ§гҒ”жЎҲеҒEгҒ—гҒҫгҒҷгҖҒE;
        note.style.display = 'block';
      }

      // LIFFзўәиӘҚгғЎгғҒEӮ»гғјгӮёйҖҒдҝЎ
      if (typeof liff !== 'undefined' && liff.isInClient()) {
        liff.sendMessages([{
          type: 'text',
          text: 'вңҒEжұәжёҲе®ҢдәҒEҒEдәҲзҙҒEўәе®ҡпјҒ\n\nдәҲзҙҒE•ӘеҸ·: ' + data.reservationId
            + '\nж—ҘжҷҒE ' + data.date + ' ' + data.startTime + '-' + data.endTime
            + '\nйҮ‘йЎҒE ВҘ' + data.totalPrice.toLocaleString() + 'ҒEҲжұәжёҲжёҲпјҒE
        }]).catch(function() {});
      }
    }

    function showError(msg) {
      document.getElementById('verifying').classList.remove('active');
      document.getElementById('errorPanel').classList.add('active');
      document.getElementById('errorMsg').textContent = msg;
    }

    function closePage() {
      if (typeof liff !== 'undefined' && liff.isInClient()) {
        liff.closeWindow();
      } else {
        window.close();
      }
    }

    function callGasApi(params, callback) {
      var cbName = 'gasCb_' + Date.now();
      var scriptEl;
      window[cbName] = function(data) {
        delete window[cbName];
        if (scriptEl && scriptEl.parentNode) scriptEl.parentNode.removeChild(scriptEl);
        callback(null, data);
      };
      var url = GAS_WEBAPP_URL + '?callback=' + cbName;
      for (var k in params) url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
      scriptEl = document.createElement('script');
      scriptEl.src = url;
      scriptEl.onerror = function() { delete window[cbName]; callback(new Error('йҖҡдҝЎгӮЁгғ©гғј')); };
      document.body.appendChild(scriptEl);
    }
  </script>
</body>
</html>
