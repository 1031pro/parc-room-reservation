<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約管理ダッシュボード | PARC ROOM STUDIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { 
      --primary: #1a1a2e; 
      --accent: #e94560; 
      --success: #10b981; 
      --warning: #f59e0b;
      --border: #e5e7eb; 
      --bg: #f3f4f6;
      --surface: #ffffff;
      --text: #111827;
      --text-sub: #6b7280;
      --radius: 8px;
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', 'Noto Sans JP', sans-serif; background:var(--bg); color:var(--text); line-height: 1.5; }
    
    /* Login */
    .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: var(--surface); padding: 40px; border-radius: 12px; box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; }
    .login-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--primary); }
    .login-box p { color: var(--text-sub); font-size: 14px; margin-bottom: 24px; }
    .login-box input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 16px; margin-bottom: 16px; }
    .login-box button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }

    /* Dashboard */
    #dashboard { display: none; }
    .navbar { background: var(--primary); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .navbar h1 { font-size: 18px; font-weight: 700; }
    .nav-actions button { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; margin-left: 8px; }

    .main-content { max-width: 1200px; margin: 0 auto; padding: 24px; }
    
    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); }
    .stat-title { font-size: 13px; color: var(--text-sub); font-weight: 500; margin-bottom: 8px; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--primary); font-family: 'Inter', sans-serif; }

    /* Controls */
    .controls-panel { background: var(--surface); padding: 16px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 6px; }
    .tab-btn { padding: 6px 16px; border: none; border-radius: 4px; background: transparent; font-size: 14px; font-weight: 500; color: var(--text-sub); cursor: pointer; }
    .tab-btn.active { background: var(--surface); color: var(--primary); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    
    /* Search Box / Filters */
    .filter-group { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .date-picker { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; cursor: pointer; color: var(--text); }
    .search-box { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; min-width: 260px; background: white; }
    .search-box input { border: none; outline: none; width: 100%; font-size: 14px; margin-left: 8px; }
    .btn-clear { background: #f3f4f6; color: var(--text-sub); border: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; }
    .btn-clear:hover { background: #e5e7eb; }

    /* Data Table */
    .table-container { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; white-space: nowrap; }
    th { background: #f8fafc; font-weight: 600; color: var(--text-sub); font-size: 13px; position: sticky; top: 0; }
    tbody tr:hover { background: #f9fafb; }
    
    .cell-id { font-family: 'Inter', monospace; font-size: 13px; color: var(--text-sub); }
    .cell-date { font-weight: 600; color: var(--primary); }
    .cell-name { font-weight: 500; }
    .cell-price { font-family: 'Inter', sans-serif; font-weight: 600; text-align: right; }
    
    .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-upcoming { background: #e0e7ff; color: #4338ca; }
    .badge-past { background: #f3f4f6; color: #4b5563; }
    .badge-cancelled { background: #fee2e2; color: #b91c1c; }
    .pay-stripe { color: var(--success); border: 1px solid currentColor; }
    .pay-onsite { color: var(--warning); border: 1px solid currentColor; }

    /* Action Dropdown / Button */
    .btn-action { padding: 6px 12px; background: white; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text); }
    .btn-action:hover { border-color: var(--text-sub); }
    .btn-danger { color: var(--accent); border-color: #fecaca; background: #fef2f2; }
    .btn-danger:hover { background: #fee2e2; border-color: #fca5a5; }

    /* Pagination */
    .pagination { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--surface); border-top: 1px solid var(--border); }
    .page-info { font-size: 13px; color: var(--text-sub); }
    .page-controls { display: flex; gap: 8px; }
    .btn-page { padding: 6px 12px; border: 1px solid var(--border); background: white; border-radius: 4px; font-size: 13px; cursor: pointer; }
    .btn-page:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-page:hover:not(:disabled) { background: var(--bg); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-sub); }

    /* Loader */
    .loader-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; display: none; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-container" id="loginView">
    <div class="login-box">
      <h1>PARC ROOM</h1>
      <p>予約管理ダッシュボード</p>
      <input type="password" id="adminKey" placeholder="管理キーを入力" onkeypress="if(event.key === 'Enter') login()">
      <button onclick="login()">ログイン</button>
      <p id="loginError" style="color:var(--accent); font-size:13px; margin-top:16px; display:none;"></p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <nav class="navbar">
      <h1>🏢 PARC ROOM 予約管理</h1>
      <div class="nav-actions">
        <button onclick="loadData()">更新</button>
        <button onclick="logout()">ログアウト</button>
      </div>
    </nav>

    <main class="main-content">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-title">今後の予約</div>
          <div class="stat-value" id="statUpcoming">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-title">今月の売上見込</div>
          <div class="stat-value" id="statRevenue">¥0</div>
        </div>
        <div class="stat-card">
          <div class="stat-title">今月の稼働枠数</div>
          <div class="stat-value" id="statSlots">0</div>
        </div>
      </div>

      <div class="controls-panel">
        <div class="tabs">
          <button class="tab-btn active" onclick="setFilter('upcoming', this)">今後の予約</button>
          <button class="tab-btn" onclick="setFilter('past', this)">過去の予約</button>
          <button class="tab-btn" onclick="setFilter('cancelled', this)">キャンセル</button>
          <button class="tab-btn" onclick="setFilter('all', this)">すべて</button>
        </div>
        <div class="filter-group">
          <!-- 日付選択カレンダー -->
          <input type="date" id="dateFilter" class="date-picker" onchange="handleSearch()" title="特定の日付で絞り込む">
          
          <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="名前、電話番号、予約番号..." onkeyup="handleSearch()">
          </div>
          <button class="btn-clear" onclick="clearFilters()">条件クリア</button>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>予約番号</th>
              <th>利用日</th>
              <th>時間帯</th>
              <th>代表者</th>
              <th>連絡先</th>
              <th>料金 / 支払方法</th>
              <th>ステータス</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="pagination">
          <div class="page-info" id="pageInfo">全 0 件中 0〜0 件を表示</div>
          <div class="page-controls">
            <button class="btn-page" id="btnPrev" onclick="changePage(-1)">前へ</button>
            <button class="btn-page" id="btnNext" onclick="changePage(1)">次へ</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="loader-overlay" id="loader">
    <div class="spinner"></div>
    <div style="font-weight:600; color:var(--text-sub)">データを取得中...</div>
  </div>

  <script>
    const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxi23B_KndTU2MRT8hKz_Way2z6aBGxJe84H-zjw_k_8BS5ytCHfHQuY4-3BkFNXR0D/exec';
    
    let allReservations = [];
    let filteredData = [];
    let currentFilter = 'upcoming';
    let currentKey = '';
    
    // Pagination settings
    const ITEMS_PER_PAGE = 20;
    let currentPage = 1;

    function callApi(params, callback) {
      const cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
      let scriptEl;
      window[cbName] = function(data) {
        delete window[cbName];
        if (scriptEl && scriptEl.parentNode) scriptEl.parentNode.removeChild(scriptEl);
        callback(null, data);
      };
      let url = GAS_WEBAPP_URL + '?callback=' + cbName;
      for (let k in params) url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
      scriptEl = document.createElement('script');
      scriptEl.src = url;
      scriptEl.onerror = function() { delete window[cbName]; callback(new Error('通信エラー')); };
      document.body.appendChild(scriptEl);
    }

    function showLoader(show) {
      document.getElementById('loader').style.display = show ? 'flex' : 'none';
    }

    function login() {
      const key = document.getElementById('adminKey').value.trim();
      if (!key) return;
      showLoader(true);
      callApi({ action: 'admin_list', key: key }, function(err, data) {
        if (err || data.error) {
          showLoader(false);
          document.getElementById('loginError').innerText = data ? data.error : '通信エラーが発生しました';
          document.getElementById('loginError').style.display = 'block';
          return;
        }
        currentKey = key;
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        sessionStorage.setItem('parcAdminKey', key);
        processData(data.reservations);
        showLoader(false);
      });
    }

    function logout() {
      sessionStorage.removeItem('parcAdminKey');
      location.reload();
    }

    window.onload = function() {
      const savedKey = sessionStorage.getItem('parcAdminKey');
      if (savedKey) {
        document.getElementById('adminKey').value = savedKey;
        login();
      }
    };

    function loadData() {
      if (!currentKey) return;
      showLoader(true);
      callApi({ action: 'admin_list', key: currentKey }, function(err, data) {
        showLoader(false);
        if (!err && !data.error) processData(data.reservations);
      });
    }

    function processData(reservations) {
      const now = new Date();
      now.setHours(0,0,0,0);
      
      allReservations = reservations.map(r => {
        // --- 日付の整形 (ISO文字列 "2026-08-09T15:00:00.000Z" などの対策) ---
        let displayDate = String(r.date);
        if (displayDate.includes('T')) {
          const d = new Date(displayDate);
          displayDate = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }
        r.date = displayDate;

        // --- 電話番号の整形 (スプレッドシートの数値化による先頭0落ち対策) ---
        let phoneStr = String(r.phone).trim();
        if (phoneStr && !phoneStr.startsWith('0')) {
          phoneStr = '0' + phoneStr;
        }
        r.phone = phoneStr;

        const dateParts = r.date.split('-');
        const itemDate = new Date(parseInt(dateParts[0]), parseInt(dateParts[1])-1, parseInt(dateParts[2]));
        let timeStatus = 'upcoming';
        if (itemDate < now) timeStatus = 'past';
        if (r.status === 'キャンセル') timeStatus = 'cancelled';
        
        // ソート用にタイムスタンプを追加
        const sortValue = itemDate.getTime() + (parseInt(r.startTime.split(':')[0]) * 3600000);
        
        return { ...r, itemDate, timeStatus, sortValue };
      });
      
      // デフォルトは利用日時の近い順（新しい順）
      allReservations.sort((a, b) => a.sortValue - b.sortValue);

      calcStats();
      currentPage = 1;
      applyFilters();
    }

    function calcStats() {
      const now = new Date();
      let upcomingCount = 0; let monthRevenue = 0; let monthSlots = 0;
      allReservations.forEach(r => {
        if (r.timeStatus === 'cancelled') return;
        if (r.timeStatus === 'upcoming') upcomingCount++;
        if (r.itemDate.getMonth() === now.getMonth() && r.itemDate.getFullYear() === now.getFullYear()) {
          monthRevenue += parseInt(r.price) || 0;
          monthSlots += (parseFloat(r.duration) || 0) * 2;
        }
      });
      document.getElementById('statUpcoming').innerText = upcomingCount;
      document.getElementById('statRevenue').innerText = '¥' + monthRevenue.toLocaleString();
      document.getElementById('statSlots').innerText = monthSlots;
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPage = 1;
      applyFilters();
    }

    function handleSearch() {
      currentPage = 1;
      applyFilters();
    }
    
    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('dateFilter').value = '';
      handleSearch();
    }

    function applyFilters() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const dateQuery = document.getElementById('dateFilter').value; // YYYY-MM-DD format
      
      filteredData = allReservations.filter(r => {
        // Status Filter
        if (currentFilter !== 'all' && r.timeStatus !== currentFilter) return false;
        
        // Date Picker Filter
        if (dateQuery && r.date !== dateQuery) return false;
        
        // Text Search Filter
        if (query) {
          const searchStr = `${r.name} ${r.phone} ${r.reservationId} ${r.date}`.toLowerCase();
          if (!searchStr.includes(query)) return false;
        }
        return true;
      });
      renderTable();
    }

    function changePage(delta) {
      currentPage += delta;
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      if (filteredData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty-state">該当する予約が見つかりません。</td></tr>`;
        updatePagination(0, 0);
        return;
      }

      const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
      const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, filteredData.length);
      const pageData = filteredData.slice(startIndex, endIndex);

      tbody.innerHTML = pageData.map(r => {
        const isCancelled = r.timeStatus === 'cancelled';
        const isStripe = r.payment === 'オンライン決済';
        
        let statusBadge = isCancelled ? '<span class="badge badge-cancelled">キャンセル</span>' 
                        : (r.timeStatus === 'past' ? '<span class="badge badge-past">利用終了</span>' : '<span class="badge badge-upcoming">予約中</span>');
        
        let paymentBadge = isStripe ? '<span class="badge pay-stripe">事前決済</span>' : '<span class="badge pay-onsite">現地払い</span>';

        let actionBtn = '-';
        if (!isCancelled && r.timeStatus === 'upcoming') {
          actionBtn = `<button class="btn-action btn-danger" onclick="cancelBooking('${r.reservationId}')">キャンセル処理</button>`;
        }

        return `
          <tr>
            <td class="cell-id">${r.reservationId}</td>
            <td class="cell-date">${r.date}</td>
            <td>${r.startTime} 〜 (${r.duration}h)</td>
            <td class="cell-name">${r.name} <span style="color:#6b7280; font-size:12px;">(${r.people}名)</span></td>
            <td>${r.phone}</td>
            <td class="cell-price">¥${Number(r.price).toLocaleString()} <br><div style="margin-top:4px">${paymentBadge}</div></td>
            <td>${statusBadge}</td>
            <td>${actionBtn}</td>
          </tr>
        `;
      }).join('');

      updatePagination(startIndex + 1, endIndex);
    }

    function updatePagination(start, end) {
      const total = filteredData.length;
      document.getElementById('pageInfo').innerText = `全 ${total} 件中 ${start}〜${end} 件を表示`;
      document.getElementById('btnPrev').disabled = currentPage === 1;
      document.getElementById('btnNext').disabled = end >= total;
    }

    function cancelBooking(reservationId) {
      if (!confirm(`予約番号: ${reservationId}\n本当にキャンセル処理を実行しますか？\n(返金額等はキャンセルポリシーに従って自動計算されます)`)) return;
      showLoader(true);
      callApi({
        action: 'admin_cancel',
        key: currentKey,
        reservation_id: reservationId,
        request_time: new Date().toISOString()
      }, function(err, data) {
        if (err || data.error) {
          showLoader(false);
          alert(data ? data.error : 'キャンセル処理中にエラーが発生しました');
          return;
        }
        let msg = `キャンセル完了: ${reservationId}`;
        if (data.refund) {
          msg += `\n【返金】${data.refund.message}`;
          if (data.refund.amount > 0) msg += ` (¥${data.refund.amount.toLocaleString()})`;
        }
        alert(msg);
        loadData();
      });
    }
  </script>
</body>
</html>
